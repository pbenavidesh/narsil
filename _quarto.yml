format:
  html:
    theme:
     light: zephyr
     dark: darkly
    css: styles.css
    code-annotations: below
    code-fold: show
    number-sections: true
    toc: true
    smooth-scroll: true
    table:
     striped: true
     hover: true
     responsive: true
    html-math-method: katex
  revealjs:
    width: 1600
    height: 900
    margin: 0.03
    scrollable: true
    incremental: true
    chalkboard: true
    controls: true
    transition: slide
    theme: serif
    logo: images/iteso_logo.png
    footnotes-hover: true
    footer: "Time Series Forecasting"
    code-annotations: hover
    slide-number: true
    preview-links: true
    number-sections: false
    toc: false
    reference-location: document
    table:
     striped: true
     hover: true
     responsive: true
    html-math-method: katex
comments:
  hypothesis:
    theme: classic
author: ""
code-link: true
code-overflow: wrap
link-external-newwindow: true
df-print: paged
